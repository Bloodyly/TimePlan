{% extends "base.html" %}
{% block content %}
<form method="post" action="/login" class="login">
  <h1>Anmeldung</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <input type="password" name="password" placeholder="Passwort" autofocus>
  <button type="submit">Anmelden</button>
</form>
{% endblock %}
